<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Stamps</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #FFD726;
      --orange: #FF6B35;
      --red: #E8354A;
      --navy: #0D1B2A;
      --cream: #FFF8ED;
      --card-bg: #FFFFFF;
      --text: #0D1B2A;
      --muted: #8B8FA8;
      --radius: 16px;
      --ticket-radius: 12px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ─── VIEWS ─── */
    .view { display: none; min-height: 100vh; }
    .view.active { display: flex; flex-direction: column; }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--cream);
    }

    .logo {
      font-family: 'Fredoka', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-stamp {
      width: 34px;
      height: 34px;
      background: var(--yellow);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transform: rotate(-4deg);
      box-shadow: 2px 2px 0 var(--orange);
    }

    .btn-add {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--navy);
      color: white;
      border: none;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
      line-height: 1;
    }
    .btn-add:hover { background: var(--orange); transform: scale(1.08) rotate(90deg); }

    /* ─── HOME VIEW ─── */
    #view-home { background: var(--cream); }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      text-align: center;
      gap: 16px;
    }

    .empty-icon {
      font-size: 64px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .empty-state h2 {
      font-family: 'Fredoka', sans-serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--navy);
    }

    .empty-state p {
      color: var(--muted);
      font-size: 15px;
      max-width: 240px;
      line-height: 1.5;
    }

    .btn-primary {
      background: var(--navy);
      color: var(--yellow);
      border: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-family: 'Fredoka', sans-serif;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 3px 3px 0 var(--orange);
      margin-top: 8px;
    }
    .btn-primary:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--orange); }
    .btn-primary:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--orange); }

    /* ─── PASS GRID ─── */
    .passes-grid {
      padding: 8px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 4px;
    }

    /* ─── TICKET CARD ─── */
    .ticket-card {
      background: white;
      border-radius: var(--ticket-radius);
      overflow: hidden;
      display: flex;
      align-items: stretch;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
      border: 1.5px solid rgba(0,0,0,0.06);
    }
    .ticket-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
    .ticket-card:active { transform: scale(0.98); }

    /* Ticket perforated edge */
    .ticket-card::before, .ticket-card::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--cream);
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
    }
    .ticket-card::before { left: 74px; box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.06); }
    .ticket-card::after { right: -9px; display: none; }

    .ticket-stub {
      width: 80px;
      min-width: 80px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .ticket-stub::after {
      content: '';
      position: absolute;
      right: -1px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: repeating-linear-gradient(
        to bottom,
        var(--cream) 0px,
        var(--cream) 6px,
        transparent 6px,
        transparent 12px
      );
    }

    .ticket-stub-emoji {
      font-size: 26px;
      transform: rotate(-90deg);
    }

    .ticket-body {
      flex: 1;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .ticket-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--navy);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ticket-date {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    .ticket-thumb {
      width: 64px;
      min-width: 64px;
      background: #f0f0f0;
      overflow: hidden;
    }

    .ticket-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .ticket-arrow {
      display: flex;
      align-items: center;
      padding-right: 14px;
      color: var(--muted);
      font-size: 18px;
    }

    /* ─── ADD VIEW ─── */
    #view-add {
      background: var(--cream);
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--navy);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .back-btn:hover { background: rgba(0,0,0,0.06); }

    .add-content {
      flex: 1;
      padding: 8px 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .add-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--navy);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .form-input {
      background: white;
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: var(--navy);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--orange); }
    .form-input::placeholder { color: var(--muted); }

    .upload-zone {
      background: white;
      border: 2px dashed rgba(0,0,0,0.12);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .upload-zone:hover { border-color: var(--orange); background: #fff5f0; }
    .upload-zone.has-image { padding: 0; border: none; overflow: hidden; height: 220px; }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon { font-size: 40px; }
    .upload-text { font-family: 'Fredoka', sans-serif; font-size: 18px; color: var(--navy); }
    .upload-sub { font-size: 13px; color: var(--muted); }

    #upload-preview {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      border-radius: var(--radius);
    }

    .save-btn {
      background: var(--orange);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 50px;
      font-family: 'Fredoka', sans-serif;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 3px 3px 0 var(--red);
      margin-top: auto;
    }
    .save-btn:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--red); }
    .save-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--red); }
    .save-btn:disabled { background: var(--muted); box-shadow: none; cursor: not-allowed; transform: none; }

    /* ─── PASS VIEW (fullscreen) ─── */
    #view-pass {
      background: #000;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #pass-img-display {
      max-width: 100vw;
      max-height: 100vh;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .pass-close {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 100;
    }
    .pass-close:hover { background: rgba(255,255,255,0.3); }

    .pass-delete {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(232,53,74,0.8);
      backdrop-filter: blur(10px);
      border: none;
      color: white;
      font-family: 'Fredoka', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 50px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #view-pass:hover .pass-delete { opacity: 1; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-family: 'Fredoka', sans-serif;
      font-size: 16px;
      font-weight: 500;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── SCROLL TOP PADDING ─── */
    .passes-grid-wrap { padding-top: 4px; }
  </style>
</head>
<body>

<!-- ═══ HOME VIEW ═══ -->
<div class="view active" id="view-home">
  <header>
    <div class="logo">
      <div class="logo-stamp">🎟️</div>
      Stamps
    </div>
    <button class="btn-add" onclick="showView('add')" title="Add pass">+</button>
  </header>

  <div id="home-empty" class="empty-state" style="display:none;">
    <div class="empty-icon">🎢</div>
    <h2>No passes yet!</h2>
    <p>Save your park tickets and passes to access them instantly at the gate.</p>
    <button class="btn-primary" onclick="showView('add')">Add your first pass</button>
  </div>

  <div id="home-list" class="passes-grid" style="display:none;">
    <div class="section-label">Your passes</div>
  </div>
</div>

<!-- ═══ ADD VIEW ═══ -->
<div class="view" id="view-add">
  <header>
    <button class="back-btn" onclick="showView('home')">←</button>
    <div style="width:40px;"></div>
  </header>
  <div class="add-content">
    <div class="add-title">New Pass 🎟️</div>

    <div class="form-group">
      <label class="form-label">Pass Name</label>
      <input class="form-input" id="pass-name" type="text" placeholder="e.g. Universal Studios" maxlength="40" />
    </div>

    <div class="form-group">
      <label class="form-label">Pass Image</label>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)" />
        <div class="upload-icon">📷</div>
        <div class="upload-text">Tap to upload</div>
        <div class="upload-sub">PNG, JPG, screenshot — anything works</div>
        <img id="upload-preview" alt="Preview" />
      </div>
    </div>

    <button class="save-btn" id="save-btn" onclick="savePass()" disabled>Save Pass</button>
  </div>
</div>

<!-- ═══ PASS VIEW ═══ -->
<div class="view" id="view-pass">
  <button class="pass-close" onclick="exitPass()">✕</button>
  <img id="pass-img-display" alt="Pass" />
  <button class="pass-delete" id="pass-delete-btn" onclick="deleteCurrentPass()">🗑 Delete pass</button>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<script>
  // ─── IndexedDB Setup ───
  let db;
  const DB_NAME = 'stamps-db';
  const DB_VERSION = 1;
  const STORE = 'passes';

  function initDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = e => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains(STORE)) {
          const store = d.createObjectStore(STORE, { keyPath: 'id' });
          store.createIndex('createdAt', 'createdAt');
        }
      };
      req.onsuccess = e => { db = e.target.result; resolve(); };
      req.onerror = () => reject(req.error);
    });
  }

  function dbGetAll() {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbGet(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get(id);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function dbPut(record) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).put(record);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  function dbDelete(id) {
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE, 'readwrite');
      const req = tx.objectStore(STORE).delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  // ─── State ───
  let currentPassId = null;
  let pendingImageData = null;

  const EMOJIS = ['🎢', '🎡', '🎠', '🎟️', '🌟', '🎆', '🎭', '🎪'];

  // ─── Views ───
  function showView(name, passId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');

    if (name === 'home') loadHomeList();
    if (name === 'add') resetAddForm();
    if (name === 'pass' && passId) openPass(passId);

    // Update URL hash for pass deep linking
    if (name === 'pass') {
      history.replaceState(null, '', '#pass-' + passId);
    } else {
      history.replaceState(null, '', window.location.pathname);
    }
  }

  // ─── Home ───
  async function loadHomeList() {
    const passes = await dbGetAll();
    passes.sort((a, b) => b.createdAt - a.createdAt);

    const emptyEl = document.getElementById('home-empty');
    const listEl = document.getElementById('home-list');

    if (passes.length === 0) {
      emptyEl.style.display = 'flex';
      listEl.style.display = 'none';
    } else {
      emptyEl.style.display = 'none';
      listEl.style.display = 'flex';

      // Clear existing cards
      const section = listEl.querySelector('.section-label');
      listEl.innerHTML = '';
      listEl.appendChild(section);

      passes.forEach(p => {
        const card = document.createElement('div');
        card.className = 'ticket-card';
        card.onclick = () => showView('pass', p.id);

        const emoji = EMOJIS[p.id % EMOJIS.length];
        const date = new Date(p.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        card.innerHTML = `
          <div class="ticket-stub">
            <span class="ticket-stub-emoji">${emoji}</span>
          </div>
          <div class="ticket-body">
            <div class="ticket-title">${escHtml(p.name)}</div>
            <div class="ticket-date">Saved ${date}</div>
          </div>
          <div class="ticket-thumb">
            <img src="${p.imageData}" alt="${escHtml(p.name)}" />
          </div>
          <div class="ticket-arrow">›</div>
        `;

        listEl.appendChild(card);
      });
    }
  }

  // ─── Add Pass ───
  function resetAddForm() {
    document.getElementById('pass-name').value = '';
    document.getElementById('file-input').value = '';
    document.getElementById('upload-preview').style.display = 'none';
    document.getElementById('upload-preview').src = '';
    document.getElementById('upload-zone').classList.remove('has-image');
    document.getElementById('save-btn').disabled = true;
    pendingImageData = null;
    document.querySelectorAll('.upload-zone > *:not(input):not(img)').forEach(el => el.style.display = '');
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = ev => {
      pendingImageData = ev.target.result;
      const preview = document.getElementById('upload-preview');
      preview.src = pendingImageData;
      preview.style.display = 'block';
      document.getElementById('upload-zone').classList.add('has-image');
      document.querySelectorAll('.upload-icon, .upload-text, .upload-sub').forEach(el => el.style.display = 'none');
      checkSaveReady();
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('pass-name').addEventListener('input', checkSaveReady);

  function checkSaveReady() {
    const name = document.getElementById('pass-name').value.trim();
    document.getElementById('save-btn').disabled = !(name && pendingImageData);
  }

  async function savePass() {
    const name = document.getElementById('pass-name').value.trim();
    if (!name || !pendingImageData) return;

    const pass = {
      id: Date.now(),
      name,
      imageData: pendingImageData,
      createdAt: Date.now()
    };

    await dbPut(pass);
    showToast('Pass saved! 🎟️');
    showView('home');
  }

  // ─── View Pass ───
  async function openPass(id) {
    currentPassId = id;
    const pass = await dbGet(id);
    if (!pass) { showView('home'); return; }
    document.getElementById('pass-img-display').src = pass.imageData;

    // Request true fullscreen
    const el = document.getElementById('view-pass');
    try {
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
    } catch {}
  }

  // Exit fullscreen and return home
  function exitPass() {
    try {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      }
    } catch {}
    showView('home');
  }

  // If user presses Escape / swipes out of fullscreen, go back to home
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement && document.getElementById('view-pass').classList.contains('active')) {
      showView('home');
    }
  });
  document.addEventListener('webkitfullscreenchange', () => {
    if (!document.webkitFullscreenElement && document.getElementById('view-pass').classList.contains('active')) {
      showView('home');
    }
  });

  async function deleteCurrentPass() {
    if (!currentPassId) return;
    if (!confirm('Delete this pass?')) return;
    await dbDelete(currentPassId);
    showToast('Pass deleted');
    exitPass();
  }

  // ─── Toast ───
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ─── Helpers ───
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── Handle hash-based deep links ───
  async function handleHash() {
    const hash = window.location.hash;
    const match = hash.match(/^#pass-(\d+)$/);
    if (match) {
      const id = parseInt(match[1]);
      showView('pass', id);
    } else {
      showView('home');
    }
  }

  // ─── Init ───
  initDB().then(() => {
    handleHash();
  });

  window.addEventListener('hashchange', handleHash);

  // Keep screen awake on pass view (if supported)
  let wakeLock = null;
  document.getElementById('view-pass').addEventListener('transitionend', async () => {
    if (document.getElementById('view-pass').classList.contains('active')) {
      try {
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
      } catch {}
    } else {
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
    }
  });
</script>
</body>
</html>
